name: Apply OBS Sport Eyes v1.10.0o

on:
  push:
    branches:
      - main
    paths:
      - .github/patches/v1.10.0o-group-edge-zoom-min.patch

permissions:
  contents: write

jobs:
  apply-v1-10-0o:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Validate and apply v1.10.0o patch
        run: |
          git apply --check .github/patches/v1.10.0o-group-edge-zoom-min.patch
          git apply .github/patches/v1.10.0o-group-edge-zoom-min.patch

      - name: Commit source update and remove temporary automation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            src/config/SportEyesProfileManager.cpp \
            src/filter/SportEyesFilterLifecycle.cpp \
            src/filter/SportEyesFilterProperties.cpp \
            src/pipeline/SportEyesVideoTick.cpp \
            src/sport-eyes-filter-internal.h
          git rm .github/patches/v1.10.0o-group-edge-zoom-min.patch .github/workflows/apply-v1.10.0o.yml
          git commit -m "v1.10.0o add group edge zoom minimum"
          git push origin HEAD:main
