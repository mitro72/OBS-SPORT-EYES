name: Apply Director AI wiring

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-wiring:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feature/director-ai-temporal

      - name: Apply wiring patch
        run: python3 scripts/apply_director_ai_wiring.py

      - name: Commit wiring patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/detect-filter.cpp
          git diff --cached --quiet && echo "No wiring changes to commit" && exit 0
          git commit -m "Wire Director AI into group crop"
          git push origin HEAD:feature/director-ai-temporal
